name: Nova Daily Brief

# Deployability proof. Runs Nova's read-only Briefing agent and writes the output
# into the run summary — visible at Actions → the run → Summary.
#
# GREEN with or without GEMINI_API_KEY:
#   - Without the secret: prints setup instructions in the summary (no crash).
#   - With the secret: runs a live brief and posts it to the summary.
#
# To enable live briefings:
#   1. Go to Settings → Secrets and variables → Actions
#   2. Add secret: GEMINI_API_KEY = your Gemini API key

on:
  schedule:
    - cron: "30 2 * * *"    # 08:00 IST (02:30 UTC), daily
  workflow_dispatch: {}       # manual trigger — use this for the demo video
  push:
    branches: [main]
    paths:
      - "nova/**"
      - ".github/workflows/nova-daily-brief.yml"

permissions:
  contents: read

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Nova
        run: pip install -e .

      - name: Use real data if provided (optional)
        if: ${{ secrets.TASKFLOW_TASKS_JSON != '' }}
        run: |
          mkdir -p "$HOME/.taskflow"
          printf '%s' "${{ secrets.TASKFLOW_TASKS_JSON }}" > "$HOME/.taskflow/tasks.json"
          echo "TASKFLOW_DATA_PATH=$HOME/.taskflow" >> "$GITHUB_ENV"

      - name: Nova daily brief
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TASKFLOW_DATA_PATH: ${{ env.TASKFLOW_DATA_PATH || format('{0}/docs/sample_taskflow', github.workspace) }}
        run: |
          echo "## Nova — daily brief for $(date -u '+%Y-%m-%d')" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "**GEMINI_API_KEY not set** — add it at Settings → Secrets → Actions to enable live briefings." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Once the secret is set, push any change and this job will run a real Nova briefing." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          python -m nova brief --output markdown >> "$GITHUB_STEP_SUMMARY"
